name: GMC Registration Monitor

on:
  schedule:
    # Every 5 minutes, 24/7
    - cron: '*/5 * * * *'
  # Also allows a manual trigger from the GitHub UI
  workflow_dispatch:

# Prevent two runs overlapping (e.g. if a run takes longer than 5 mins)
concurrency:
  group: gmc-monitor
  cancel-in-progress: false

jobs:
  check:
    name: Check GMC registration
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit state.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          # Always pull the latest state.json (avoid stale reads)
          fetch-depth: 1

      - name: Run GMC monitor
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: python3 gmc_monitor.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name  "GMC Monitor Bot"
          git config user.email "actions@github.com"
          git add state.json
          # Only commit if state.json actually changed
          if git diff --staged --quiet; then
            echo "No state change — nothing to commit."
          else
            git commit -m "chore: update GMC state [skip ci]"
            # Pull any concurrent changes before pushing
            git pull --rebase origin main
            git push
          fi
